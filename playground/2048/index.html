<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:none;user-select:none;font-family:'Fredoka',Arial,sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#faf8ef;transition:background .6s}

.header{display:flex;align-items:center;justify-content:space-between;width:min(92vw,400px);margin-bottom:6px}
.title{font-size:clamp(36px,10vw,52px);font-weight:700;letter-spacing:-2px;background:linear-gradient(135deg,#f67c5f,#edc22e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.scores{display:flex;gap:6px}
.score-box{background:#bbada0;color:#fff;padding:4px 14px;border-radius:8px;text-align:center;min-width:65px}
.score-box .label{font-size:9px;text-transform:uppercase;opacity:.8;letter-spacing:1px}
.score-box .val{font-size:19px;font-weight:700}

.controls{display:flex;gap:8px;width:min(92vw,400px);margin-bottom:8px;align-items:center}
.btn{padding:7px 16px;font-size:12px;font-family:inherit;font-weight:600;border:none;border-radius:8px;cursor:pointer}
.btn:active{transform:scale(.95)}
.btn-primary{background:#8f7a66;color:#fff}
.btn-secondary{background:rgba(143,122,102,.15);color:#8f7a66}
.move-count{margin-left:auto;font-size:12px;color:rgba(119,110,101,.5)}

#board{
  width:min(92vw,400px);aspect-ratio:1;
  background:#bbada0;border-radius:12px;padding:2.2%;
  display:grid;grid-template-columns:repeat(4,1fr);gap:2.2%;
  box-shadow:0 8px 40px rgba(0,0,0,.1);
  position:relative;
}
.cell{
  background:rgba(205,193,180,.5);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:clamp(22px,6vw,36px);
  position:relative;overflow:hidden;
  transition:background .1s,color .1s,box-shadow .1s;
  aspect-ratio:1;
}
.cell.pop{animation:popMerge .22s ease}
.cell.spawn{animation:popIn .18s ease}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes popMerge{0%{transform:scale(1)}25%{transform:scale(1.22)}100%{transform:scale(1)}}

/* glow for big tiles */
.cell.glow{box-shadow:0 0 20px var(--glow-color,transparent)}

/* floating +N */
.float-score{position:fixed;pointer-events:none;font-size:18px;font-weight:700;color:#776e65;z-index:100;animation:floatUp .7s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.3)}}

/* particles */
.particle{position:fixed;pointer-events:none;border-radius:50%;z-index:10;animation:particleFly .55s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

/* combo */
.combo{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-size:44px;font-weight:700;pointer-events:none;z-index:50;animation:comboFlash .7s ease-out forwards}
@keyframes comboFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4) translateY(-30px)}}

/* overlay */
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;border-radius:12px;z-index:20;pointer-events:none;opacity:0;transition:all .4s;background:rgba(255,255,255,0)}
#overlay.show{background:rgba(255,255,255,.78);backdrop-filter:blur(5px);pointer-events:auto;opacity:1}
#overlay h2{font-size:30px;color:#776e65}
#overlay .sub{font-size:16px;color:#bbada0;margin-top:2px}
#overlay button{margin-top:14px;padding:11px 32px;font-size:15px;font-family:inherit;font-weight:600;background:linear-gradient(135deg,#f67c5f,#f59563);color:#fff;border:none;border-radius:10px;cursor:pointer;box-shadow:0 4px 15px rgba(246,124,95,.35)}
#overlay button:active{transform:scale(.95)}

/* bg canvas */
#bg{position:fixed;inset:0;z-index:-1}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="header">
  <div class="title">2048</div>
  <div class="scores">
    <div class="score-box"><div class="label">Score</div><div class="val" id="sc">0</div></div>
    <div class="score-box"><div class="label">Best</div><div class="val" id="bs">0</div></div>
  </div>
</div>
<div class="controls">
  <button class="btn btn-primary" id="newbtn">New Game</button>
  <button class="btn btn-secondary" id="undobtn">Undo</button>
  <div class="move-count" id="mv">0 moves</div>
</div>
<div id="board">
  <div id="overlay"><h2 id="msg"></h2><div class="sub" id="sub"></div><button id="retrybtn">Play Again</button></div>
</div>
<script>
// ===== AUDIO =====
const AC=window.AudioContext||window.webkitAudioContext;let actx;
function ea(){if(!actx)actx=new AC()}
function tone(f,d,v=.1,t='sine'){try{ea();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+d)}catch(e){}}
function sndSlide(){tone(300,.07,.05,'triangle')}
function sndMerge(v){const b=220+Math.log2(v)*60;tone(b,.13,.08);setTimeout(()=>tone(b*1.5,.1,.06),40)}
function sndBig(){tone(440,.25,.1);setTimeout(()=>tone(554,.2,.08),70);setTimeout(()=>tone(660,.25,.1),140)}
function sndOver(){tone(330,.25,.08,'sawtooth');setTimeout(()=>tone(220,.4,.08,'sawtooth'),180)}
function vib(ms){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}

// ===== BG =====
const bgc=document.getElementById('bg'),bx=bgc.getContext('2d');
let bps=[];
function rbg(){bgc.width=innerWidth;bgc.height=innerHeight}
rbg();addEventListener('resize',rbg);
for(let i=0;i<35;i++)bps.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:2+Math.random()*4,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,h:30+Math.random()*30,a:.08+Math.random()*.1});
function dbg(){const W=bgc.width,H=bgc.height,p=Math.min(1,score/5000);
bx.fillStyle=`hsl(${40-p*20},${8+p*10}%,${97-p*8}%)`;bx.fillRect(0,0,W,H);
for(const b of bps){b.x+=b.vx;b.y+=b.vy;if(b.x<-10)b.x=W+10;if(b.x>W+10)b.x=-10;if(b.y<-10)b.y=H+10;if(b.y>H+10)b.y=-10;
const g=bx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*8);g.addColorStop(0,`hsla(${b.h+p*40},60%,70%,${b.a})`);g.addColorStop(1,`hsla(${b.h+p*40},60%,70%,0)`);bx.fillStyle=g;bx.beginPath();bx.arc(b.x,b.y,b.r*8,0,Math.PI*2);bx.fill()}
requestAnimationFrame(dbg)}
dbg();

// ===== GAME =====
const SZ=4;
const TS={0:{b:'rgba(205,193,180,.5)',f:'transparent',g:''},2:{b:'#eee4da',f:'#776e65',g:''},4:{b:'#ede0c8',f:'#776e65',g:''},8:{b:'#f2b179',f:'#f9f6f2',g:''},16:{b:'#f59563',f:'#f9f6f2',g:''},32:{b:'#f67c5f',f:'#f9f6f2',g:'rgba(246,124,95,.3)'},64:{b:'#f65e3b',f:'#f9f6f2',g:'rgba(246,94,59,.4)'},128:{b:'#edcf72',f:'#f9f6f2',g:'rgba(237,207,114,.45)'},256:{b:'#edcc61',f:'#f9f6f2',g:'rgba(237,204,97,.5)'},512:{b:'#edc850',f:'#f9f6f2',g:'rgba(237,200,80,.55)'},1024:{b:'#edc53f',f:'#f9f6f2',g:'rgba(237,197,63,.6)'},2048:{b:'#edc22e',f:'#f9f6f2',g:'rgba(237,194,46,.7)'}};
const DEF={b:'#3c3a32',f:'#f9f6f2',g:'rgba(60,58,50,.4)'};

let grid,score=0,best=0,moves=0,prevG,prevS,combo=0,lastM=0;
const boardEl=document.getElementById('board');
const cells=[];

// Create 16 cells
for(let i=0;i<SZ*SZ;i++){const d=document.createElement('div');d.className='cell';boardEl.appendChild(d);cells.push(d)}

function styleCell(idx,val,anim){
  const c=cells[idx];
  const s=TS[val]||DEF;
  c.style.background=s.b;
  c.style.color=val?s.f:'transparent';
  c.textContent=val||'';
  c.style.fontSize=val>=1024?'clamp(16px,4.5vw,26px)':val>=128?'clamp(20px,5.5vw,32px)':'';
  if(s.g){c.classList.add('glow');c.style.setProperty('--glow-color',s.g)}else{c.classList.remove('glow');c.style.setProperty('--glow-color','transparent')}
  if(anim){c.classList.remove('pop','spawn');void c.offsetWidth;c.classList.add(anim);c.addEventListener('animationend',()=>c.classList.remove(anim),{once:true})}
}

function render(info){
  for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){
    const i=r*SZ+c;const v=grid[r][c];
    let anim='';
    if(info){
      if(info.newT&&info.newT[0]===r&&info.newT[1]===c)anim='spawn';
      if(info.merged&&info.merged.some(m=>m[0]===r&&m[1]===c))anim='pop';
    }
    styleCell(i,v,anim);
  }
  document.getElementById('sc').textContent=score;
  document.getElementById('bs').textContent=best;
  document.getElementById('mv').textContent=moves+' moves';
}

function addRand(){
  const e=[];
  for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)if(!grid[r][c])e.push([r,c]);
  if(!e.length)return null;
  const[r,c]=e[Math.floor(Math.random()*e.length)];
  grid[r][c]=Math.random()<.9?2:4;
  return[r,c];
}

function newGame(){
  grid=Array.from({length:SZ},()=>Array(SZ).fill(0));
  score=0;moves=0;combo=0;prevG=null;window._w=false;
  document.getElementById('overlay').classList.remove('show');
  addRand();addRand();render(null);
}

function slide(row){
  let a=row.filter(v=>v);let ms=0;const mi=[];
  for(let i=0;i<a.length-1;i++){if(a[i]===a[i+1]){a[i]*=2;ms+=a[i];mi.push(i);a.splice(i+1,1)}}
  while(a.length<SZ)a.push(0);
  return{result:a,changed:row.some((v,i)=>v!==a[i]),ms,mi};
}

function move(dir){
  prevG=grid.map(r=>[...r]);prevS=score;
  let moved=false,tms=0;const mc=[];
  if(dir==='left'){for(let r=0;r<SZ;r++){const{result,changed,ms,mi}=slide(grid[r]);if(changed)moved=true;grid[r]=result;tms+=ms;for(const i of mi)mc.push([r,i])}}
  else if(dir==='right'){for(let r=0;r<SZ;r++){const{result,changed,ms,mi}=slide([...grid[r]].reverse());if(changed)moved=true;grid[r]=result.reverse();tms+=ms;for(const i of mi)mc.push([r,3-i])}}
  else if(dir==='up'){for(let c=0;c<SZ;c++){const col=[grid[0][c],grid[1][c],grid[2][c],grid[3][c]];const{result,changed,ms,mi}=slide(col);if(changed)moved=true;for(let r=0;r<SZ;r++)grid[r][c]=result[r];tms+=ms;for(const i of mi)mc.push([i,c])}}
  else if(dir==='down'){for(let c=0;c<SZ;c++){const col=[grid[3][c],grid[2][c],grid[1][c],grid[0][c]];const{result,changed,ms,mi}=slide(col);if(changed)moved=true;for(let r=0;r<SZ;r++)grid[r][c]=result[3-r];tms+=ms;for(const i of mi)mc.push([3-i,c])}}
  if(!moved){prevG=null;return}
  score+=tms;best=Math.max(best,score);moves++;

  // effects
  if(mc.length){
    const mx=Math.max(...mc.map(([r,c])=>grid[r][c]));
    if(mx>=128){sndBig();vib([15,25,15])}else{sndMerge(mx);vib(12)}
    if(tms)floatScore(tms);
    for(const[r,c]of mc)particles(r,c,grid[r][c]);
    const now=Date.now();if(now-lastM<1200){combo++;if(combo>=2)showCombo(combo)}else combo=1;lastM=now;
    if(mx>=128){boardEl.style.transform=`translate(${(Math.random()-.5)*5}px,${(Math.random()-.5)*5}px)`;setTimeout(()=>boardEl.style.transform='',80)}
  }else{sndSlide();vib(4);combo=0}

  const nt=addRand();render({merged:mc,newT:nt});

  const mt=Math.max(...grid.flat());
  if(mt>=2048&&!window._w){window._w=true;sndBig();vib([40,40,40,40,80]);document.getElementById('msg').textContent='2048!';document.getElementById('sub').textContent='Score: '+score;setTimeout(()=>document.getElementById('overlay').classList.add('show'),400)}
  else if(isLose()){sndOver();vib([80,40,150]);document.getElementById('msg').textContent='Game Over';document.getElementById('sub').textContent=score+' pts / '+moves+' moves';setTimeout(()=>document.getElementById('overlay').classList.add('show'),500)}
}

function isLose(){for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(!grid[r][c])return false;if(c<SZ-1&&grid[r][c]===grid[r][c+1])return false;if(r<SZ-1&&grid[r][c]===grid[r+1][c])return false}return true}

function undo(){if(!prevG)return;grid=prevG;score=prevS;prevG=null;render(null);tone(250,.08,.04,'triangle')}

// ===== EFFECTS =====
function floatScore(n){
  const el=document.createElement('div');el.className='float-score';el.textContent='+'+n;
  const b=document.getElementById('sc').getBoundingClientRect();
  el.style.left=b.left+b.width/2+'px';el.style.top=b.bottom+4+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),800);
}

function particles(r,c,val){
  const cell=cells[r*SZ+c];const rect=cell.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const s=TS[val]||DEF;const n=val>=128?14:val>=32?8:5;
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*.4;
    const d=25+Math.random()*40+(val>=128?20:0);
    const p=document.createElement('div');p.className='particle';
    p.style.left=cx+'px';p.style.top=cy+'px';
    const sz=2+Math.random()*4;p.style.width=sz+'px';p.style.height=sz+'px';
    p.style.background=s.b;
    p.style.setProperty('--dx',Math.cos(a)*d+'px');
    p.style.setProperty('--dy',Math.sin(a)*d+'px');
    document.body.appendChild(p);setTimeout(()=>p.remove(),600);
  }
}

function showCombo(n){
  const el=document.createElement('div');el.className='combo';
  const lb=['','','DOUBLE!','TRIPLE!','QUAD!','INSANE!'];
  el.textContent=lb[Math.min(n,5)]||(n+'x COMBO!');
  el.style.color=n>=4?'#f65e3b':n>=3?'#f59563':'#edcf72';
  document.body.appendChild(el);setTimeout(()=>el.remove(),800);
}

// ===== INPUT =====
let sx,sy,st;
document.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;st=Date.now()});
document.addEventListener('pointerup',e=>{
  const dx=e.clientX-sx,dy=e.clientY-sy,ax=Math.abs(dx),ay=Math.abs(dy);
  if(Math.max(ax,ay)<15||Date.now()-st>800)return;
  ax>ay?move(dx>0?'right':'left'):move(dy>0?'down':'up');
});
document.addEventListener('keydown',e=>{
  const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(m[e.key]){e.preventDefault();move(m[e.key])}
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();undo()}
});

document.getElementById('retrybtn').onclick=()=>{window._w=false;newGame()};
document.getElementById('newbtn').onclick=()=>{window._w=false;newGame()};
document.getElementById('undobtn').onclick=undo;

newGame();
</script>
</body>
</html>
