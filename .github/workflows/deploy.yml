name: Deploy Qwen Chat to Modal

on:
  push:
    branches: [master, main]
    paths:
      - 'qwen-chat/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-modal:
    name: Deploy to Modal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modal
        run: pip install modal

      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ak-J3bq1tUBgvqluGN1brNSdm
          MODAL_TOKEN_SECRET: as-ZwedMAASD1zEVXgzybloJe
        run: |
          cd qwen-chat
          modal deploy modal_deploy.py
