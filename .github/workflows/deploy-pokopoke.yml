name: Deploy PokoPoké to GitHub Pages

on:
  push:
    branches: ['claude/pokemon-app-new-qvz2A', 'main']
    paths:
      - 'pokopoke-habitat-guide/**'
      - '.github/workflows/deploy-pokopoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: ./pokopoke-habitat-guide
        run: npm ci
      - name: Build
        working-directory: ./pokopoke-habitat-guide
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pokopoke-habitat-guide/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
